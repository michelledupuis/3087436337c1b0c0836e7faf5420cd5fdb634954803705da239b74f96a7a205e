name: Android VM

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: 'Session duration in minutes (max 330)'
        required: true
        default: '240'

jobs:
  arm64_vm:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    env:
      ANDROID_API_LEVEL: 30
      ANDROID_BUILD_TOOLS: 30.0.3
      EMULATOR_NAME: e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux deps (KVM, cloudflared, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            qemu-user-static \
            bridge-utils \
            libpulse0 \
            libnss3 \
            libxss1 \
            libasound2 \
            libgl1 \
            libxshmfence1 \
            cpu-checker \
            android-tools-adb
          # Grant KVM access to the runner user (GitHub Actions runners have /dev/kvm
          # but the runner user is NOT in the kvm group by default).
          sudo gpasswd -a $USER kvm || true
          sudo chmod 666 /dev/kvm 2>/dev/null || true
          # Verify KVM access
          kvm-ok 2>/dev/null || echo "kvm-ok not available"
          ls -la /dev/kvm 2>/dev/null || echo "(no /dev/kvm)"
          # Install cloudflared
          curl -L -o /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: Cache Android SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk
          key: android-sdk-x86_64-linux-api30-v1

      - name: Install Android SDK + Emulator (x86_64 system image)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -e
          SDK_ROOT=~/android-sdk
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT/cmdline-tools"
          curl -L -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "system-images;android-${ANDROID_API_LEVEL};google_apis;x86_64" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          echo "SDK install completed"

      - name: Create AVD (x86_64)
        run: |
          set -e
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator"
          echo "=== Available system images ==="
          sdkmanager --list_installed | grep -E "system-images|platforms|build-tools" || true
          echo "=== Creating AVD (x86_64) ==="
          echo "no" | avdmanager create avd \
            -n ${{ env.EMULATOR_NAME }} \
            -k "system-images;android-${ANDROID_API_LEVEL};google_apis;x86_64" \
            -d pixel_5 --force
          echo "=== AVD created. Listing AVDs: ==="
          avdmanager list avd | head -30
          echo "=== AVD .ini file location ==="
          ls -la "$ANDROID_AVD_HOME/"

      - name: Add SDK to PATH
        run: |
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/${ANDROID_BUILD_TOOLS}" >> $GITHUB_PATH
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install frida frida-tools cryptography lief capstone pyyaml requests

      - name: Fix KVM permissions
        run: |
          echo "=== Before fix ==="
          ls -la /dev/kvm
          id
          # Try multiple approaches to grant KVM access
          sudo chmod 666 /dev/kvm
          echo "=== After chmod 666 ==="
          ls -la /dev/kvm
          # Also try adding to kvm group (may not take effect until next login,
          # but we'll use sg/newgrp to work around that)
          sudo gpasswd -a $USER kvm || true
          # Verify we can actually open /dev/kvm
          if [ -w /dev/kvm ]; then
            echo "✓ /dev/kvm is writable by current user"
          else
            echo "✗ /dev/kvm is NOT writable — trying setfacl"
            sudo apt-get install -y acl
            sudo setfacl -m u:$USER:rw /dev/kvm
            ls -la /dev/kvm
            getfacl /dev/kvm
          fi

      - name: Boot emulator headless (KVM accelerated x86_64)
        id: boot_emu
        continue-on-error: true
        run: |
          set -e
          echo "=== CPU info ==="
          nproc
          grep -E "^(model name|flags)" /proc/cpuinfo | head -2
          echo "=== KVM availability ==="
          ls -la /dev/kvm
          if [ -w /dev/kvm ]; then
            echo "✓ /dev/kvm is writable"
          else
            echo "✗ /dev/kvm is NOT writable — KVM will fail"
          fi
          echo ""
          echo "=== Starting x86_64 emulator with KVM acceleration ==="
          # Use -accel auto (tries KVM, falls back to TCG)
          # If KVM permissions still fail, the emulator will exit and we'll
          # see the error in emulator.log
          nohup emulator -avd ${{ env.EMULATOR_NAME }} \
            -accel auto -no-metrics \
            -no-window -no-audio -no-boot-anim -no-snapshot \
            -gpu swiftshader_indirect -no-snapshot-save \
            -partition-size 2048 \
            -wipe-data \
            > ~/emulator.log 2>&1 &
          EMU_PID=$!
          echo "Emulator PID: $EMU_PID"
          sleep 5
          if ! kill -0 $EMU_PID 2>/dev/null; then
            echo "ERROR: emulator process died immediately"
            tail -100 ~/emulator.log
            exit 1
          fi
          # Fail fast on KVM — don't let -accel auto silently fall back to
          # TCG (software emulation), which is too slow to boot Android in
          # the 10-minute boot timeout below.
          if [ ! -w /dev/kvm ]; then
            echo "ERROR: /dev/kvm is not writable — KVM acceleration unavailable."
            echo "Cannot boot x86_64 Android emulator without KVM in under 10 min."
            ls -la /dev/kvm 2>/dev/null || true
            exit 1
          fi
          echo "Waiting for device (up to 5 min)..."
          if ! timeout 300 adb wait-for-device; then
            echo "ERROR: adb wait-for-device timed out after 5 min"
            tail -100 ~/emulator.log
            exit 1
          fi
          echo "Device registered. Waiting for boot completion (up to 10 min)..."
          if ! timeout 600 bash -c '
            while [[ -z $(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r") ]]; do
              sleep 5
              echo -n "."
            done
          '; then
            echo "ERROR: boot completion timed out after 10 min"
            tail -100 ~/emulator.log
            adb shell getprop | head -50
            exit 1
          fi
          echo ""
          echo "=== Boot completed ==="
          echo "ABI:        $(adb shell getprop ro.product.cpu.abi | tr -d "\r")"
          echo "API level:  $(adb shell getprop ro.build.version.sdk | tr -d "\r")"
          echo "Fingerprint: $(adb shell getprop ro.build.fingerprint | tr -d "\r")"

      - name: Dump emulator log on failure
        if: steps.boot_emu.outcome == 'failure'
        run: |
          echo "=== Boot failed. Full emulator.log: ==="
          cat ~/emulator.log 2>/dev/null || echo "(no emulator.log)"
          echo ""
          echo "=== adb devices: ==="
          adb devices || true
          echo ""
          echo "=== Running processes (emulator/adb/qemu): ==="
          ps aux | grep -E "emulator|adb|qemu" | grep -v grep || true
          exit 1

      - name: Download Phantom Frida server (x86_64) — anti-detection build
        run: |
          # Phantom Frida is the user's custom-built anti-detection Frida fork.
          # It covers 16 detection vectors with ~90 patches (process name,
          # libfrida-agent.so, thread names, memfd name, frida_agent_main symbol,
          # SELinux labels, libc hooks, D-Bus service, default port, internal C
          # symbols, GType names, temp paths, binary string residuals, build
          # config defines, asset directory). The binary is built with
          # --extended --temp-fixes for maximum stealth.
          #
          # This specific release uses:
          #   custom_name = system_helper681 (replaces 'frida' everywhere)
          #   port         = 37194 (built-in default, no flag needed)
          #   arch         = android-x86_64
          #   frida_version = 17.13.0 (matches frida-tools pip package)
          #   extended     = true
          #   temp_fixes   = true
          #
          # SHA256 of the .gz is verified against the official build-info.json
          # published in the same release.
          set -e
          PHANTOM_TAG="v17.13.0-android-x86_64-20260617"
          PHANTOM_GZ="system_helper681-server-17.13.0-android-x86_64.gz"
          PHANTOM_BIN="system_helper681-server-17.13.0-android-x86_64"
          EXPECTED_SHA256="84043d8b46043a69567312fd8d50a253bac78c9c42503ea70feac6137a333e4b"
          echo "=== Fetching Phantom Frida build-info.json (verify SHA256) ==="
          curl -fsSL -o /tmp/build-info.json \
            "https://github.com/michelledupuis/phantom-frida/releases/download/${PHANTOM_TAG}/build-info.json"
          cat /tmp/build-info.json
          ACTUAL_SHA256=$(jq -r '.artifacts.server_gz.sha256' /tmp/build-info.json)
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: SHA256 mismatch in build-info.json"
            echo "  expected: $EXPECTED_SHA256"
            echo "  actual:   $ACTUAL_SHA256"
            exit 1
          fi
          echo "✓ build-info.json SHA256 verified: $ACTUAL_SHA256"
          PORT_FROM_JSON=$(jq -r '.port' /tmp/build-info.json)
          CUSTOM_NAME_FROM_JSON=$(jq -r '.custom_name' /tmp/build-info.json)
          echo "Phantom Frida custom_name: $CUSTOM_NAME_FROM_JSON, port: $PORT_FROM_JSON"
          if [ "$PORT_FROM_JSON" != "37194" ] || [ "$CUSTOM_NAME_FROM_JSON" != "system_helper681" ]; then
            echo "ERROR: unexpected Phantom Frida build parameters"
            exit 1
          fi
          echo "=== Downloading $PHANTOM_GZ (~44MB) ==="
          mkdir -p ~/phantom-frida
          cd ~/phantom-frida
          curl -fsSL -o "$PHANTOM_GZ" \
            "https://github.com/michelledupuis/phantom-frida/releases/download/${PHANTOM_TAG}/${PHANTOM_GZ}"
          DOWNLOAD_SHA256=$(sha256sum "$PHANTOM_GZ" | awk '{print $1}')
          if [ "$DOWNLOAD_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: downloaded .gz SHA256 mismatch"
            echo "  expected: $EXPECTED_SHA256"
            echo "  actual:   $DOWNLOAD_SHA256"
            exit 1
          fi
          echo "✓ downloaded .gz SHA256 verified: $DOWNLOAD_SHA256"
          gunzip -k "$PHANTOM_GZ"
          chmod +x "$PHANTOM_BIN"
          ls -lh "$PHANTOM_BIN"
          file "$PHANTOM_BIN" || true
          # Persist parameters for subsequent steps
          echo "37194" > ~/phantom-frida-port.txt
          echo "system_helper681" > ~/phantom-frida-name.txt

      - name: Start Phantom Frida server on emulator (port 37194)
        run: |
          set -e
          PHANTOM_BIN="system_helper681-server-17.13.0-android-x86_64"
          PORT=$(cat ~/phantom-frida-port.txt)
          NAME=$(cat ~/phantom-frida-name.txt)
          echo "Phantom Frida name: $NAME, port: $PORT"
          adb root
          sleep 3
          adb wait-for-device
          # Push to /data/local/tmp/ — use a NON-'frida' filename (binary already
          # uses system_helper681 as the internal name; we keep the filename
          # consistent so detection vector #1 (process name) is fully obscured)
          adb push ~/phantom-frida/$PHANTOM_BIN /data/local/tmp/${NAME}-server
          adb shell "chmod 755 /data/local/tmp/${NAME}-server"
          # Launch in daemon mode. Phantom Frida binary has port 37194 baked in
          # as default (built via --port 37194), so no -l flag needed.
          adb shell "nohup /data/local/tmp/${NAME}-server -D > /data/local/tmp/${NAME}-server.log 2>&1 &"
          sleep 5
          # Verify the server is actually running
          echo "=== Processes matching ${NAME} on device ==="
          adb shell "ps -A | grep -E '${NAME}|37194' || echo '(no match — checking all processes)' && ps -A | head -30"
          echo "=== Setting up ADB port forward (PC tcp:37194 -> device tcp:37194) ==="
          adb forward tcp:${PORT} tcp:${PORT}
          adb forward --list
          # Quick smoke test: frida-ps -H should list device processes
          echo "=== frida-ps -H 127.0.0.1:${PORT} smoke test ==="
          timeout 30 frida-ps -H 127.0.0.1:${PORT} 2>&1 | head -15 || echo "(frida-ps -H smoke test failed — server may still be starting)"
          echo "=== ${NAME}-server.log (device) ==="
          adb shell "cat /data/local/tmp/${NAME}-server.log 2>&1 | tail -30"

      - name: Install MCP server deps + generate token
        run: |
          cd $GITHUB_WORKSPACE
          # NOTE: do NOT use --ignore-scripts — node-pty's prebuild-install
          # postinstall is what fetches the linux-x64 prebuilt binary.
          # Without it, dist/src/server.js will throw "Cannot find module node-pty".
          npm install --no-audit --no-fund --loglevel=error
          # Verify node-pty prebuilt loaded successfully
          node -e "const pty=require('node-pty'); console.log('node-pty OK, version:', require('node-pty/package.json').version);"
          TOKEN=$(node 4f72e6a6.js .mcp-auth-token)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: token generation failed"
            exit 1
          fi
          echo "Token generated: ${#TOKEN} chars"
          echo "$TOKEN" > ~/mcp-token.txt
          # NOTE: we intentionally do NOT call ::add-mask::$TOKEN here.
          # poll_workflow.py (on the agent side) extracts the token from this
          # job's log via the regex r'Auth Token:\s*([a-f0-9]{64})'. Masking
          # it would replace the token with '**' in the log and break polling.
          # The repo is private; the token is single-session and expires with the VM.

      - name: Start MCP server + cloudflared tunnel
        run: |
          cd $GITHUB_WORKSPACE
          TOKEN=$(cat ~/mcp-token.txt)
          export MCP_HTTP_AUTH_TOKEN="$TOKEN"
          nohup node dist/src/server.js --transport http --host 127.0.0.1 --port 8808 > ~/mcp-server.log 2>&1 &
          MCP_PID=$!
          echo "MCP server PID: $MCP_PID"
          sleep 5
          if ! curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8808/mcp | grep -qE "200|401|405"; then
            echo "ERROR: MCP server not responding"
            cat ~/mcp-server.log
            exit 1
          fi
          echo "MCP server is up at http://127.0.0.1:8808/mcp"
          nohup cloudflared tunnel --url http://localhost:8808 > ~/cloudflared.log 2>&1 &
          CF_PID=$!
          echo "Cloudflared PID: $CF_PID"
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' ~/cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 1
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: tunnel URL not found in cloudflared log"
            cat ~/cloudflared.log
            exit 1
          fi
          echo "$TUNNEL_URL" > ~/tunnel-url.txt
          {
            echo "## ARM64 VM Connection Info"
            echo ""
            echo "**MCP URL:** \`$TUNNEL_URL/mcp\`"
            echo ""
            echo "**Auth Token:** \`$TOKEN\`"
            echo ""
            echo "**Emulator ABI:** \`$(adb shell getprop ro.product.cpu.abi | tr -d "\r")\`"
            echo "**Android API:** \`$(adb shell getprop ro.build.version.sdk | tr -d "\r")\`"
            echo "**Fingerprint:** \`$(adb shell getprop ro.build.fingerprint | tr -d "\r")\`"
            echo ""
            echo "To connect via mcp_shell.py:"
            echo '```bash'
            echo "python mcp_shell.py --url $TUNNEL_URL/mcp --token $TOKEN \"adb shell getprop ro.product.cpu.abi\""
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Print connection info (prominent)
        run: |
          echo "=========================================================="
          echo "          ARM64 VM READY FOR USE"
          echo "=========================================================="
          echo ""
          echo "MCP URL:        $(cat ~/tunnel-url.txt)/mcp"
          echo "Auth Token:     $(cat ~/mcp-token.txt)"
          echo "Emulator ABI:   $(adb shell getprop ro.product.cpu.abi | tr -d "\r")"
          echo "Android API:    $(adb shell getprop ro.build.version.sdk | tr -d "\r")"
          echo "Fingerprint:    $(adb shell getprop ro.build.fingerprint | tr -d "\r")"
          echo ""
          echo "Phantom Frida processes on device:"
          NAME=$(cat ~/phantom-frida-name.txt)
          PORT=$(cat ~/phantom-frida-port.txt)
          adb shell "ps -A | grep -E '${NAME}' || echo '(no ${NAME} processes — server died?)'"
          echo ""
          echo "First 10 frida-ps -H 127.0.0.1:${PORT} entries:"
          timeout 15 frida-ps -H 127.0.0.1:${PORT} 2>&1 | head -10 || echo "(frida-ps -H timed out or failed)"
          echo ""
          echo "VM will stay alive for ${{ inputs.session_minutes }} minutes."

      # ---------------------------------------------------------------------------
      # Mid-run artifact upload so the agent can fetch connection info via API
      # BEFORE the keep-alive loop finishes. (GitHub does not expose in-progress
      # job logs via API; the log blob is only uploaded on job completion.)
      # ---------------------------------------------------------------------------
      - name: Publish connection info as artifact
        uses: actions/upload-artifact@v4
        with:
          name: connection-info
          path: |
            ~/tunnel-url.txt
            ~/mcp-token.txt
          if-no-files-found: error
          retention-days: 1

      - name: Keep VM alive (session loop)
        run: |
          NAME=$(cat ~/phantom-frida-name.txt)
          PORT=$(cat ~/phantom-frida-port.txt)
          END=$((SECONDS + ${{ inputs.session_minutes }} * 60))
          HEARTBEAT=0
          while [ $SECONDS -lt $END ]; do
            HEARTBEAT=$((HEARTBEAT + 1))
            if ! adb shell echo alive > /dev/null 2>&1; then
              echo "[$(date)] ADB lost! Reconnecting..."
              adb kill-server; sleep 2; adb start-server
              adb wait-for-device || break
              # Re-establish port forward after ADB restart
              adb forward tcp:${PORT} tcp:${PORT} || true
            fi
            # Check Phantom Frida server (renamed) is alive
            if ! adb shell "pgrep -f /data/local/tmp/${NAME}-server" > /dev/null 2>&1; then
              echo "[$(date)] ${NAME}-server died, restarting..."
              adb shell "nohup /data/local/tmp/${NAME}-server -D > /data/local/tmp/${NAME}-server.log 2>&1 &"
              sleep 3
              adb forward tcp:${PORT} tcp:${PORT} || true
            fi
            if ! pgrep -f "dist/src/server.js" > /dev/null 2>&1; then
              echo "[$(date)] MCP server died, restarting..."
              cd $GITHUB_WORKSPACE
              TOKEN=$(cat ~/mcp-token.txt)
              export MCP_HTTP_AUTH_TOKEN="$TOKEN"
              nohup node dist/src/server.js --transport http --host 127.0.0.1 --port 8808 >> ~/mcp-server.log 2>&1 &
            fi
            if ! pgrep -f "cloudflared tunnel" > /dev/null 2>&1; then
              echo "[$(date)] cloudflared died, restarting..."
              nohup cloudflared tunnel --url http://localhost:8808 >> ~/cloudflared.log 2>&1 &
            fi
            if [ $((HEARTBEAT % 10)) -eq 0 ]; then
              echo "[$(date)] Heartbeat #$HEARTBEAT — VM still alive (Phantom Frida on :${PORT})"
            fi
            sleep 60
          done
          echo "[$(date)] Session ended after ${{ inputs.session_minutes }} minutes."

      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-vm-logs-${{ github.run_id }}
          path: |
            ~/emulator.log
            ~/mcp-server.log
            ~/cloudflared.log
            ~/tunnel-url.txt
            ~/mcp-token.txt
            ~/phantom-frida-port.txt
            ~/phantom-frida-name.txt
          if-no-files-found: ignore
          retention-days: 7
