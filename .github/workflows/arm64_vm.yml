name: ARM64 Android VM (ubuntu-22.04-arm native)

# =============================================================================
# This workflow spins up a NATIVE ARM64 Android emulator on a GitHub Actions
# ubuntu-22.04-arm (AWS Graviton) runner with KVM acceleration.
#
# WHY ARM64 NATIVE (not ubuntu x86_64):
#   - All our prior RE artifacts are ARM64:
#       * 1007 Ghidra decompiled functions
#       * ecobank_libdp_decrypted.bin (573 KB valid ARM64 inner image)
#       * ECO_RAW_VM_KEY = 9b4fab17...6a63 (proven, produces valid image)
#       * precision_key_extract_arm64_frida17_v*.js (5 versions)
#   - On ARM64 native, the linker64 is ARM64, so r_brk = 0xC0035FD6 (ARM64 RET).
#     The DexProtector VM expects exactly this value. On x86_64, r_brk is
#     0xE9B3B43B (JMP rel32) — wrong bytes -> VM produces wrong key -> init_status=500.
#     This is the FUNDAMENTAL blocker on x86_64 that no amount of Frida hooking
#     can fix (overwriting r_brk in linker causes #UD because 0xD6 is invalid
#     in x86_64 long mode).
#   - On ARM64 Linux, there is NO CPUID instruction -> no "KVMKVMKVM" CPUID
#     signature -> DexProtector's check 0x0d (CPUID hypervisor detection) PASSES
#     by default. QEMU/goldfish properties can be spoofed via Frida hooks.
#   - We tried macOS-14 first (Hypervisor.framework) but GHA macOS runners
#     don't expose HVF to nested virtualization (HVF error: HV_UNSUPPORTED).
#   - ubuntu-22.04-arm exposes /dev/kvm natively (AWS Graviton), so the
#     ARM64 Android emulator boots fast with KVM acceleration.
#   - Net result: VM produces correct ARM64 outer key -> DPLF decrypts -> inner
#     libdp.so loads -> HMAC wrapper is hookable -> password captured ->
#     master_key computed -> classes.ecobank.dat decrypted.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      session_minutes:
        description: 'Session duration in minutes (max 330, leaves 30min buffer for teardown)'
        required: true
        default: '240'
      tunnel_token:
        description: 'Cloudflared named-tunnel token (optional). Leave empty for ephemeral trycloudflare URL.'
        required: false
        default: ''

# Hard cap: GitHub Actions macOS jobs max out at 6h = 360min.
# We use 330 to leave buffer for teardown + artifact upload.
jobs:
  arm64_vm:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 350
    env:
      ANDROID_API_LEVEL: 30
      ANDROID_BUILD_TOOLS: 30.0.3
      EMULATOR_NAME: ecobank_arm64
      # Release tag holding ARM64 APK splits + Phantom Frida ARM64 binary
      ARM64_ASSETS_TAG: v-arm64-transfer-1782140279

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux deps (KVM, cloudflared, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            qemu-utils \
            bridge-utils \
            libpulse0 \
            libnss3 \
            libxss1 \
            libasound2 \
            libgl1 \
            libxshmfence1 \
            cpu-checker \
            android-tools-adb \
            wget
          # Grant KVM access to the runner user
          sudo gpasswd -a $USER kvm || true
          sudo chmod 666 /dev/kvm 2>/dev/null || true
          kvm-ok 2>/dev/null || echo "kvm-ok not available"
          ls -la /dev/kvm 2>/dev/null || echo "(no /dev/kvm)"
          # Install cloudflared (arm64)
          curl -L -o /tmp/cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      # ---------------------------------------------------------------------------
      # Cache the Android SDK + system image + AVD. First run ~10 min; cache hits ~30s.
      # ---------------------------------------------------------------------------
      - name: Cache Android SDK + AVD
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk
            ~/.android/avd
          key: android-sdk-arm64-linux-api30-v1

      - name: Install Android SDK + Emulator (ARM64 system image)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -e
          SDK_ROOT=~/android-sdk
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT/cmdline-tools"
          curl -L -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          cd "$SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "system-images;android-${ANDROID_API_LEVEL};google_apis;arm64-v8a" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          echo "no" | avdmanager create avd \
            -n ${{ env.EMULATOR_NAME }} \
            -k "system-images;android-${ANDROID_API_LEVEL};google_apis;arm64-v8a" \
            -d pixel_5 --force

      - name: Add Android SDK to PATH
        run: |
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/${ANDROID_BUILD_TOOLS}" >> $GITHUB_PATH
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Pin frida to match Phantom Frida server version (17.13.0).
          pip install frida==17.13.0 "frida-tools<14.10" cryptography lief capstone pyyaml requests

      # ---------------------------------------------------------------------------
      # Boot emulator headless using Apple's Hypervisor.framework (native ARM64)
      # ---------------------------------------------------------------------------
      - name: Fix KVM permissions
        run: |
          echo "=== Before fix ==="
          ls -la /dev/kvm
          id
          sudo chmod 666 /dev/kvm
          echo "=== After chmod 666 ==="
          ls -la /dev/kvm
          sudo gpasswd -a $USER kvm || true
          if [ -w /dev/kvm ]; then
            echo "✓ /dev/kvm is writable by current user"
          else
            echo "✗ /dev/kvm is NOT writable — trying setfacl"
            sudo apt-get install -y acl
            sudo setfacl -m u:$USER:rw /dev/kvm
            ls -la /dev/kvm
            getfacl /dev/kvm
          fi

      - name: Boot emulator headless (native ARM64 via KVM)
        id: boot_emu
        continue-on-error: true
        run: |
          set -e
          echo "=== Architecture check ==="
          uname -m  # should be aarch64
          echo "=== KVM availability ==="
          ls -la /dev/kvm
          if [ -w /dev/kvm ]; then
            echo "✓ /dev/kvm is writable"
          else
            echo "✗ /dev/kvm is NOT writable — KVM will fail"
          fi
          echo "=== AVD config ==="
          cat ~/.android/avd/${{ env.EMULATOR_NAME }}.ini 2>/dev/null || true
          cat ~/.android/avd/${{ env.EMULATOR_NAME }}.avd/config.ini 2>/dev/null | head -30 || true
          echo "=== Starting ARM64 emulator with KVM acceleration ==="
          nohup emulator -avd ${{ env.EMULATOR_NAME }} \
            -accel auto -no-metrics \
            -no-window -no-audio -no-boot-anim -no-snapshot \
            -gpu swiftshader_indirect -no-snapshot-save \
            -partition-size 2048 \
            -wipe-data \
            > ~/emulator.log 2>&1 &
          EMU_PID=$!
          echo "Emulator PID: $EMU_PID"
          sleep 5
          if ! kill -0 $EMU_PID 2>/dev/null; then
            echo "ERROR: emulator process died immediately"
            tail -100 ~/emulator.log
            exit 1
          fi
          if [ ! -w /dev/kvm ]; then
            echo "ERROR: /dev/kvm is not writable — KVM acceleration unavailable."
            echo "Cannot boot ARM64 Android emulator without KVM in under 10 min."
            ls -la /dev/kvm 2>/dev/null || true
            exit 1
          fi
          echo "Waiting for device (up to 5 min)..."
          if ! timeout 300 adb wait-for-device; then
            echo "ERROR: adb wait-for-device timed out after 5 min"
            tail -100 ~/emulator.log
            exit 1
          fi
          echo "Device registered. Waiting for boot completion (up to 10 min)..."
          if ! timeout 600 bash -c '
            while [[ -z $(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r") ]]; do
              sleep 5
              echo -n "."
            done
          '; then
            echo "ERROR: boot completion timed out after 10 min"
            tail -100 ~/emulator.log
            adb shell getprop | head -50
            exit 1
          fi
          echo ""
          echo "=== Boot completed ==="
          echo "ABI:        $(adb shell getprop ro.product.cpu.abi | tr -d "\r")"
          echo "API level:  $(adb shell getprop ro.build.version.sdk | tr -d "\r")"
          echo "Fingerprint: $(adb shell getprop ro.build.fingerprint | tr -d "\r")"

      - name: Dump emulator log on failure
        if: steps.boot_emu.outcome == 'failure'
        run: |
          echo "=== Boot failed. Full emulator.log: ==="
          cat ~/emulator.log 2>/dev/null || echo "(no emulator.log)"
          echo ""
          echo "=== adb devices: ==="
          adb devices || true
          exit 1

      # ---------------------------------------------------------------------------
      # Download ARM64 APK splits + Phantom Frida ARM64 from the release
      # ---------------------------------------------------------------------------
      - name: Download ARM64 APK splits + Phantom Frida ARM64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p ~/arm64_assets
          cd ~/arm64_assets
          TAG="${{ env.ARM64_ASSETS_TAG }}"
          REPO="${{ github.repository }}"
          echo "=== Downloading assets from release $TAG in repo $REPO ==="
          for asset in base.apk split_config.arm64_v8a.apk split_config.xxhdpi.apk system_helper681-server-17.13.0-android-arm64.gz; do
            echo "--- Downloading $asset ---"
            curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "https://github.com/$REPO/releases/download/$TAG/$asset" -o "$asset"
            ls -lh "$asset"
          done
          echo "=== Verifying all assets ==="
          ls -lh ~/arm64_assets/
          echo "=== Decompressing Phantom Frida ARM64 ==="
          cd ~/arm64_assets
          gunzip -kf system_helper681-server-17.13.0-android-arm64.gz
          chmod +x system_helper681-server-17.13.0-android-arm64
          file system_helper681-server-17.13.0-android-arm64
          ls -lh system_helper681-server-17.13.0-android-arm64

      # ---------------------------------------------------------------------------
      # Start Phantom Frida ARM64 on emulator (port 37194)
      # ---------------------------------------------------------------------------
      - name: Start Phantom Frida ARM64 server on emulator
        run: |
          PHANTOM_BIN="system_helper681-server-17.13.0-android-arm64"
          PORT=37194
          NAME="system_helper681"
          echo "Phantom Frida name: $NAME, port: $PORT"
          echo "=== Waiting 20s for adbd to stabilize after boot ==="
          sleep 20
          adb wait-for-device
          # Retry adb root
          ROOT_OK=0
          for i in 1 2 3 4 5 6 7 8; do
            echo "=== adb root attempt $i ==="
            ADB_ROOT_OUT=$(adb root 2>&1)
            echo "$ADB_ROOT_OUT"
            if echo "$ADB_ROOT_OUT" | grep -qE "restarting via|already running as root"; then
              echo "✓ adb root succeeded on attempt $i"
              ROOT_OK=1
              break
            fi
            sleep 5
          done
          if [ $ROOT_OK -eq 0 ]; then
            echo "ERROR: adb root failed after 8 attempts"
            adb shell getprop ro.debuggable 2>&1 || true
            adb shell id 2>&1 || true
            adb shell getprop ro.build.type 2>&1 || true
            exit 1
          fi
          sleep 8
          adb wait-for-device
          echo "=== Verify root: adb shell id ==="
          adb shell id
          if ! adb shell id | grep -q "uid=0(root)"; then
            echo "ERROR: adb shell is NOT root after adb root"
            exit 1
          fi
          echo "✓ adb shell is running as root"
          adb push ~/arm64_assets/$PHANTOM_BIN /data/local/tmp/${NAME}-server
          adb shell "chmod 755 /data/local/tmp/${NAME}-server"
          adb shell "nohup /data/local/tmp/${NAME}-server -D > /data/local/tmp/${NAME}-server.log 2>&1 &"
          sleep 8
          echo "=== Processes matching ${NAME} on device ==="
          adb shell "ps -A | grep -E '${NAME}|37194' || echo '(no match)'"
          echo "=== /data/local/tmp/${NAME}-server.log (last 30 lines) ==="
          adb shell "cat /data/local/tmp/${NAME}-server.log 2>&1 | tail -30"
          echo "=== Setting up ADB port forward ==="
          adb forward tcp:${PORT} tcp:${PORT}
          adb forward --list
          echo "=== frida-ps -H 127.0.0.1:${PORT} smoke test ==="
          for i in 1 2 3 4 5; do
            PS_OUT=$(timeout 30 frida-ps -H 127.0.0.1:${PORT} 2>&1)
            if echo "$PS_OUT" | grep -qE "^[0-9]+"; then
              echo "✓ frida-ps succeeded on attempt $i"
              echo "$PS_OUT" | head -15
              break
            fi
            echo "(frida-ps attempt $i failed, retrying in 5s)"
            echo "$PS_OUT" | head -5
            sleep 5
          done
          # Persist
          echo "$PORT" > ~/phantom-frida-port.txt
          echo "$NAME" > ~/phantom-frida-name.txt

      # ---------------------------------------------------------------------------
      # Install ARM64 APK on emulator
      # ---------------------------------------------------------------------------
      - name: Install Ecobank ARM64 APK
        run: |
          set -e
          echo "=== Installing ARM64 APK via adb install-multiple ==="
          cd ~/arm64_assets
          adb install-multiple -r base.apk split_config.arm64_v8a.apk split_config.xxhdpi.apk
          echo "=== Verifying install ==="
          adb shell pm list packages | grep ecobank
          adb shell dumpsys package com.app.ecobank | grep -E "versionName|versionCode|primaryCpuAbi" | head -5

      # ---------------------------------------------------------------------------
      # MCP HTTP Server + Cloudflared tunnel (same as ubuntu workflow)
      # ---------------------------------------------------------------------------
      - name: Install MCP server deps + generate token
        run: |
          cd $GITHUB_WORKSPACE
          npm install --no-audit --no-fund --loglevel=error
          node -e "const pty=require('node-pty'); console.log('node-pty OK, version:', require('node-pty/package.json').version);"
          TOKEN=$(node 4f72e6a6.js .mcp-auth-token)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: token generation failed"
            exit 1
          fi
          echo "Token generated: ${#TOKEN} chars"
          echo "$TOKEN" > ~/mcp-token.txt

      - name: Start MCP server + cloudflared tunnel
        run: |
          cd $GITHUB_WORKSPACE
          TOKEN=$(cat ~/mcp-token.txt)
          export MCP_HTTP_AUTH_TOKEN="$TOKEN"
          nohup node dist/src/server.js --transport http --host 127.0.0.1 --port 8808 > ~/mcp-server.log 2>&1 &
          MCP_PID=$!
          echo "MCP server PID: $MCP_PID"
          sleep 5
          if ! curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8808/mcp | grep -qE "200|401|405"; then
            echo "ERROR: MCP server not responding"
            cat ~/mcp-server.log
            exit 1
          fi
          echo "MCP server is up at http://127.0.0.1:8808/mcp"
          if [ -n "${{ inputs.tunnel_token }}" ]; then
            nohup cloudflared tunnel run --token "${{ inputs.tunnel_token }}" > ~/cloudflared.log 2>&1 &
          else
            nohup cloudflared tunnel --url http://localhost:8808 > ~/cloudflared.log 2>&1 &
          fi
          CF_PID=$!
          echo "Cloudflared PID: $CF_PID"
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' ~/cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 1
          done
          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: tunnel URL not found in cloudflared log"
            cat ~/cloudflared.log
            exit 1
          fi
          echo "$TUNNEL_URL" > ~/tunnel-url.txt
          {
            echo "## ARM64 Native VM Connection Info"
            echo ""
            echo "**MCP URL:** \`$TUNNEL_URL/mcp\`"
            echo ""
            echo "**Auth Token:** \`$TOKEN\`"
            echo ""
            echo "**Emulator ABI:** \`$(adb shell getprop ro.product.cpu.abi | tr -d "\r")\`"
            echo "**Android API:** \`$(adb shell getprop ro.build.version.sdk | tr -d "\r")\`"
            echo "**Fingerprint:** \`$(adb shell getprop ro.build.fingerprint | tr -d "\r")\`"
            echo ""
            echo "To connect via mcp_shell.py:"
            echo '```bash'
            echo "python mcp_shell.py --url $TUNNEL_URL/mcp --token $TOKEN \"adb shell getprop ro.product.cpu.abi\""
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Print connection info (prominent)
        run: |
          echo "=========================================================="
          echo "       ARM64 NATIVE VM READY FOR USE"
          echo "=========================================================="
          echo ""
          echo "MCP URL:        $(cat ~/tunnel-url.txt)/mcp"
          echo "Auth Token:     $(cat ~/mcp-token.txt)"
          echo "Emulator ABI:   $(adb shell getprop ro.product.cpu.abi | tr -d "\r")"
          echo "Android API:    $(adb shell getprop ro.build.version.sdk | tr -d "\r")"
          echo "Fingerprint:    $(adb shell getprop ro.build.fingerprint | tr -d "\r")"
          echo ""
          NAME=$(cat ~/phantom-frida-name.txt)
          PORT=$(cat ~/phantom-frida-port.txt)
          echo "Phantom Frida ARM64 on :${PORT}"
          adb shell "ps -A | grep -E '${NAME}' || echo '(no ${NAME} processes)'"
          echo ""
          echo "First 10 frida-ps -H 127.0.0.1:${PORT} entries:"
          timeout 15 frida-ps -H 127.0.0.1:${PORT} 2>&1 | head -10 || echo "(frida-ps -H timed out)"
          echo ""
          echo "Ecobank package:"
          adb shell pm list packages | grep ecobank || echo "(not installed)"
          echo ""
          echo "VM will stay alive for ${{ inputs.session_minutes }} minutes."

      - name: Publish connection info as artifact
        uses: actions/upload-artifact@v4
        with:
          name: connection-info
          path: |
            ~/tunnel-url.txt
            ~/mcp-token.txt
          if-no-files-found: error
          retention-days: 1

      - name: Keep VM alive (session loop)
        run: |
          NAME=$(cat ~/phantom-frida-name.txt)
          PORT=$(cat ~/phantom-frida-port.txt)
          END=$((SECONDS + ${{ inputs.session_minutes }} * 60))
          HEARTBEAT=0
          while [ $SECONDS -lt $END ]; do
            HEARTBEAT=$((HEARTBEAT + 1))
            if ! adb shell echo alive > /dev/null 2>&1; then
              echo "[$(date)] ADB lost! Reconnecting..."
              adb kill-server; sleep 2; adb start-server
              adb wait-for-device || break
              adb forward tcp:${PORT} tcp:${PORT} || true
            fi
            if ! adb shell "pgrep -f /data/local/tmp/${NAME}-server" > /dev/null 2>&1; then
              echo "[$(date)] ${NAME}-server died, restarting..."
              adb shell "nohup /data/local/tmp/${NAME}-server -D > /data/local/tmp/${NAME}-server.log 2>&1 &"
              sleep 3
              adb forward tcp:${PORT} tcp:${PORT} || true
            fi
            if ! pgrep -f "dist/src/server.js" > /dev/null 2>&1; then
              echo "[$(date)] MCP server died, restarting..."
              cd $GITHUB_WORKSPACE
              TOKEN=$(cat ~/mcp-token.txt)
              export MCP_HTTP_AUTH_TOKEN="$TOKEN"
              nohup node dist/src/server.js --transport http --host 127.0.0.1 --port 8808 >> ~/mcp-server.log 2>&1 &
            fi
            if ! pgrep -f "cloudflared tunnel" > /dev/null 2>&1; then
              echo "[$(date)] cloudflared died, restarting..."
              nohup cloudflared tunnel --url http://localhost:8808 >> ~/cloudflared.log 2>&1 &
            fi
            if [ $((HEARTBEAT % 10)) -eq 0 ]; then
              echo "[$(date)] Heartbeat #$HEARTBEAT — VM still alive (Phantom Frida ARM64 on :${PORT})"
            fi
            sleep 60
          done
          echo "[$(date)] Session ended after ${{ inputs.session_minutes }} minutes."

      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-vm-logs-${{ github.run_id }}
          path: |
            ~/emulator.log
            ~/mcp-server.log
            ~/cloudflared.log
            ~/tunnel-url.txt
            ~/mcp-token.txt
            ~/phantom-frida-port.txt
            ~/phantom-frida-name.txt
          if-no-files-found: ignore
          retention-days: 7
